    function max(arrays) {
        // Maximum initialization value is 0
        for (var i = 0; i < arrays.length-1; i++) {
            if(arrays[i] > arrays[i+1]) {
                var temp = arrays[i];
                arrays[i] = arrays[i+1];
                arrays[i+1] = temp;
            }
        }
        var maxValue = arrays[arrays.length - 1];
        return maxValue;
    }
