<script>
    function minValue(array) {
        var minValue = 0;
        var l = array.length - 1;
        for(i = 0; i < l; i++) {
            for(j = 0; i < l; j++) {
                if(array[i] < array[j]) {
                    minValue = array[i];
                }
                else {
                    minValue = array[j];
                }
            }
        }
        return minValue;
    }

    array = [5, 90, 2, 1, 7];
    document.write("minimum value: " + minValue(array));
</script>
