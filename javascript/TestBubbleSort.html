<script>
    function bSort(array) {
        while (true) {
            for (var i = 0; i < array.length - 1; i++) {
                counter = 0;
                if (array[i] < array[i+1]) {
                    var temp = array[i];
                    array[i] = array[i+1];
                    array[i+1] = temp;
                    counter++;
                }
                if (counter > 0) {
                    continue;
                }
                else {
                    return array;
                }
            }
        }
    }

    var values = [10, 70, 20, 50, 90]
    document.write("sorted array of numbers: " + bSort(values));

</script>
