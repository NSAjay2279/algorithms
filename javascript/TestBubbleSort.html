<script type="text/javascript">
    function bSort(array) {
        while (true) {
            for (var i = 0; i < array.length - 1; i++) {
                for (var j = 0; j < array.length - 1; j++) {
                    var counter = 0;
                    if (array[i] > array[j+1]) {
                        var temp = array[i];
                        array[i] = array[j+1];
                        array[j+1] = temp;
                        counter++;
                    }
                }
            }
            if (counter > 0) {
                continue;
            }
            else {
                return array;
            }
        }
    }

    var values = [60, 50, 95, 80, 70];
    document.write("sorted array of numbers: " + bSort(values));

</script>
